name: Filter Timeout VLESS Configs

on:
  schedule:
    - cron: '0 */6 * * *' # هر ۶ ساعت یک‌بار اجرا می‌شود
  workflow_dispatch: # دکمه اجرای دستی

jobs:
  run-filter:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run Filter Script
      run: python main.py

    - name: Commit and Push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Mirzakochak"
        git add filtered_vless.txt
        git commit -m "Auto-update: Removed timeout VLESS configs" || exit 0
        git push
